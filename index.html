<style>
  :root{

    --panel:rgba(255,255,255,.88);

    --warn:#f39a2f;
    --bad:#e24c68;

  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:"Microsoft YaHei","PingFang SC",system-ui,-apple-system,sans-serif;color:var(--text);background:

  .home{display:grid;grid-template-columns:1.08fr .92fr;gap:36px;align-items:center}

  .tag{padding:10px 14px;border-radius:13px;background:#fff;border:1px solid var(--line);font-weight:700;color:#554b69}
  .main-btn,.ghost-btn,.mini-btn{border:0;border-radius:15px;cursor:pointer;transition:.18s transform,.18s box-shadow,.18s opacity}
  .main-btn:hover,.ghost-btn:hover,.mini-btn:hover{transform:translateY(-2px)}
  .main-btn{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;font-weight:900;padding:15px 24px;box-shadow:0 10px 24px rgba(108,76,255,.28)}

  .home-actions{display:flex;gap:12px;flex-wrap:wrap}
  .hero-card{position:relative;min-height:500px;display:flex;align-items:center;justify-content:center}
  .orbit{position:absolute;width:390px;height:390px;border:2px dashed #d9cdf8;border-radius:50%;animation:spin 28s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .big24{position:relative;width:260px;height:260px;border-radius:42px;background:linear-gradient(145deg,#7b58ff,#4d2bc6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:118px;box-shadow:0 30px 60px rgba(75,43,162,.34);transform:rotate(-4deg)}
  .float-num{position:absolute;width:70px;height:70px;border-radius:20px;background:#fff;box-shadow:0 10px 28px rgba(61,40,106,.15);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:950}
  .n1{top:38px;left:20px;transform:rotate(-10deg)} .n2{top:36px;right:6px;transform:rotate(11deg)} .n3{bottom:47px;left:8px;transform:rotate(8deg)} .n4{bottom:30px;right:32px;transform:rotate(-8deg)}
  .screen-head{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:26px}
  .screen-head h2{font-size:34px;margin:0}.screen-head p{margin:6px 0 0;color:var(--muted)}
  .mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .mode-card{border:1px solid var(--line);background:#fff;border-radius:24px;padding:24px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;min-height:320px;display:flex;flex-direction:column}
  .mode-card:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:#d3c3ff}
  .mode-icon{width:62px;height:62px;border-radius:19px;display:flex;align-items:center;justify-content:center;font-size:29px;background:#eee8ff}
  .mode-card h3{font-size:27px;margin:18px 0 8px}.mode-card p{color:var(--muted);line-height:1.7;margin:0}
  .mode-stats{margin-top:auto;display:flex;justify-content:space-between;align-items:end;padding-top:24px}
  .mode-progress{font-weight:900;color:var(--primary)}
  .level-wrap{display:grid;grid-template-columns:260px 1fr;gap:26px}
  .mode-side{background:linear-gradient(155deg,#5d3ee0,#9b6dff);border-radius:24px;color:white;padding:24px;min-height:540px;display:flex;flex-direction:column}
  .mode-side h3{font-size:32px;margin:14px 0 8px}.mode-side p{opacity:.85;line-height:1.7}
  .side-progress{margin-top:auto}.progress-track{height:10px;background:rgba(255,255,255,.23);border-radius:999px;overflow:hidden}.progress-fill{height:100%;background:#fff;border-radius:999px;width:0}
  .level-panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px;min-height:540px}
  .level-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.level-toolbar h3{margin:0;font-size:24px}.small-note{font-size:13px;color:var(--muted)}
  .level-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:9px;max-height:460px;overflow:auto;padding:3px}
  .level-btn{aspect-ratio:1;border-radius:12px;border:1px solid var(--line);background:#faf9ff;color:var(--text);cursor:pointer;font-weight:850;position:relative}
  .level-btn:hover{border-color:var(--primary);color:var(--primary)}.level-btn.done{background:#e9fff5;color:var(--good);border-color:#b9efd8}.level-btn.current{outline:3px solid #dcd1ff}
  .game-screen{padding:22px 28px 30px}
  .game-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .game-top .right{display:flex;justify-content:flex-end;gap:8px}.game-top .center{text-align:center}.level-name{font-size:14px;color:var(--muted);font-weight:800}.timer{font-size:26px;font-weight:950;letter-spacing:1px}
  .mini-btn{background:#fff;border:1px solid var(--line);padding:10px 13px;font-weight:800;color:var(--text)}
  .status-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:18px 0}
  .status-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 15px;text-align:center}.status-card small{display:block;color:var(--muted);margin-bottom:4px}.status-card strong{font-size:20px}
  .board{background:linear-gradient(165deg,#faf8ff,#fff);border:1px solid var(--line);border-radius:26px;min-height:420px;padding:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .board::before{content:"24";position:absolute;font-size:250px;font-weight:1000;color:#f3effd;right:-12px;bottom:-80px;pointer-events:none}
  .instruction{z-index:1;text-align:center;color:var(--muted);font-weight:700;margin-bottom:22px;min-height:24px}
  .number-pool{z-index:1;display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;min-height:128px}
  .num-card{width:96px;height:112px;border:2px solid transparent;border-radius:23px;background:#fff;box-shadow:0 12px 28px rgba(69,49,111,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:1000;position:relative;transition:.16s;user-select:none}
  .num-card:hover{transform:translateY(-4px)}.num-card.selected{border-color:var(--primary);transform:translateY(-7px);box-shadow:0 15px 30px rgba(108,76,255,.25)}.num-card.locked{opacity:.38;cursor:not-allowed;box-shadow:none}.num-card.locked:hover{transform:none}.num-card.current{background:linear-gradient(145deg,#efe9ff,#fff);border-color:#c8b8ff}.num-card .badge{position:absolute;top:7px;left:8px;font-size:11px;border-radius:999px;padding:4px 7px;background:#eee8ff;color:var(--primary);font-weight:900}.num-card .order{position:absolute;right:-7px;top:-8px;width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center}
  .operation-builder{z-index:1;width:min(650px,100%);display:grid;grid-template-columns:minmax(92px,1fr) auto minmax(92px,1fr);align-items:center;gap:16px;margin-top:24px;padding:15px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.78)}
  .operand-slot{min-height:82px;border:2px dashed #d8cff0;border-radius:18px;display:flex;align-items:center;justify-content:center;padding:10px;text-align:center;color:var(--muted);font-weight:850;background:#fbfaff}
  .operand-slot.filled{border-style:solid;border-color:#c8b8ff;color:var(--text);background:#f3efff;font-size:34px;font-weight:1000}
  .operator-row{display:grid;grid-template-columns:repeat(2,58px);gap:8px;justify-content:center}.op-btn{width:58px;height:50px;border:0;border-radius:15px;background:#2d2440;color:white;font-size:27px;font-weight:900;cursor:pointer;transition:.15s}.op-btn:hover{transform:translateY(-3px);background:var(--primary)}.op-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}.op-btn.selected,.op-btn.selected:disabled{opacity:1;background:var(--primary);outline:3px solid #d9ceff;box-shadow:0 8px 18px rgba(108,76,255,.28)}
  .operator-caption{grid-column:1/-1;text-align:center;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:-2px}
  @media(max-width:650px){.operation-builder{grid-template-columns:minmax(72px,1fr) auto minmax(72px,1fr);gap:9px;padding:10px}.operator-row{grid-template-columns:repeat(2,46px);gap:6px}.op-btn{width:46px;height:44px}.operand-slot{min-height:68px}.operand-slot.filled{font-size:28px}}
  .message{z-index:1;margin-top:16px;min-height:24px;text-align:center;font-weight:800}.message.good{color:var(--good)}.message.bad{color:var(--bad)}.message.warn{color:var(--warn)}
  .history{margin-top:15px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:35px}.history-chip{padding:8px 11px;border-radius:11px;background:#f1edfb;color:#4e4561;font-weight:750;font-size:14px}
  .game-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px}
  .modal{position:fixed;inset:0;background:rgba(25,17,45,.45);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.modal-card{width:min(470px,100%);background:#fff;border-radius:25px;padding:28px;text-align:center;box-shadow:var(--shadow)}.modal-card h3{font-size:31px;margin:6px 0 10px}.modal-card p{color:var(--muted);line-height:1.7}.modal-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:22px}.answer-box{text-align:left;background:#f7f4ff;border-radius:16px;padding:15px;margin-top:15px;line-height:1.9;font-weight:750}
  .toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);background:#2d2440;color:white;padding:12px 18px;border-radius:13px;opacity:0;pointer-events:none;transition:.22s;z-index:50;font-weight:750}.toast.show{opacity:1;transform:translate(-50%,0)}
  @media(max-width:820px){.screen{padding:24px}.home{grid-template-columns:1fr}.hero-card{display:none}.mode-grid{grid-template-columns:1fr}.level-wrap{grid-template-columns:1fr}.mode-side{min-height:auto}.level-grid{grid-template-columns:repeat(5,1fr)}.game-top{grid-template-columns:1fr auto}.game-top .center{grid-column:1/-1;grid-row:2}.status-row{grid-template-columns:1fr 1fr}.status-row .status-card:last-child{grid-column:1/-1}.num-card{width:78px;height:94px;font-size:34px}.board{padding:20px 12px}.shell,.screen{min-height:100vh;border-radius:0}.app{padding:0}}
</style>
</head>
<body>
<div class="app"><main class="shell">
  <section id="homeScreen" class="screen active home">
    <div>
      <div class="brand-pill">🧠 纯整数运算挑战</div>
      <h1>整数<br>24点</h1>
      <p class="subtitle">按照“数字 → 运算符 → 数字”的顺序进行加、减、乘、除。每一步结果都必须是大于等于1的整数；新结果会放回数字池，可在之后任意选择，直到用完所有数字并得到24。</p>
      <div class="rule-tags"><span class="tag">只用 ＋－×÷</span><span class="tag">禁止小数</span><span class="tag">用完所有数字</span><span class="tag">300道题</span></div>
      <div class="home-actions"><button class="main-btn" onclick="showModes()">开始挑战</button><button class="ghost-btn" onclick="shareGame()">分享游戏</button><button class="ghost-btn" onclick="showRules()">查看规则</button></div>
    </div>
    <div class="hero-card"><div class="orbit"></div><div class="big24">24</div><div class="float-num n1">3</div><div class="float-num n2">8</div><div class="float-num n3">6</div><div class="float-num n4">1</div></div>
  </section>

  <section id="modeScreen" class="screen">
    <div class="screen-head"><div><h2>选择挑战模式</h2><p>每个模式100题，完成记录会自动保存在当前浏览器。</p></div><button class="ghost-btn" onclick="goHome()">返回首页</button></div>
    <div id="modeGrid" class="mode-grid"></div>
  </section>

  <section id="levelScreen" class="screen">
    <div class="screen-head"><div><h2>选择关卡</h2><p>可自由选择任意题目，绿色表示已经完成。</p></div><button class="ghost-btn" onclick="showModes()">返回模式</button></div>
    <div class="level-wrap"><aside id="modeSide" class="mode-side"></aside><div class="level-panel"><div class="level-toolbar"><h3>100道题</h3><span class="small-note">进度保存在本机</span></div><div id="levelGrid" class="level-grid"></div></div></div>
  </section>

  <section id="gameScreen" class="screen game-screen">
    <div class="game-top"><div><button class="mini-btn" onclick="exitMode()">← 退出模式</button></div><div class="center"><div id="levelName" class="level-name"></div><div id="timer" class="timer">00:00</div></div><div class="right"><button class="mini-btn" onclick="showAnswer()">答案</button><button class="mini-btn" onclick="shareGame()">分享</button></div></div>
    <div class="status-row"><div class="status-card"><small>目标</small><strong>24</strong></div><div class="status-card"><small>剩余数字</small><strong id="remainingCount">0</strong></div><div class="status-card"><small>已完成步骤</small><strong id="stepCount">0</strong></div></div>
    <div class="board"><div id="instruction" class="instruction"></div><div id="numberPool" class="number-pool"></div><div class="operation-builder"><div id="leftOperand" class="operand-slot">第一个运算数</div><div class="operator-row"><div id="operatorCaption" class="operator-caption">等待第一个数字</div><button class="op-btn" data-op="+">+</button><button class="op-btn" data-op="-">−</button><button class="op-btn" data-op="*">×</button><button class="op-btn" data-op="/">÷</button></div><div id="rightOperand" class="operand-slot">第二个运算数</div></div><div id="message" class="message"></div><div id="history" class="history"></div></div>
    <div class="game-actions"><button class="ghost-btn" onclick="undoStep()">↶ 回退一步</button><button class="ghost-btn" onclick="restartLevel()">重玩本题</button><button class="ghost-btn" onclick="previousLevel()">上一题</button><button class="main-btn" onclick="nextLevel()">下一题</button></div>
  </section>
</main></div>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div id="modalCard" class="modal-card"></div></div><div id="toast" class="toast"></div>
<script>

 const left=pool.find(x=>x.id===selected[0]);

function symbol(op){return op==='*'?'×':op==='/'?'÷':op}

 chosenOp=op;setMessage(`已选择 ${symbol(op)}，请点击第二个数字。`,'good');renderGame()
}
function completeOperation(secondId){
 const first=pool.find(x=>x.id===selected[0]),second=pool.find(x=>x.id===secondId),op=chosenOp;if(!first||!second||!op)return;

 history.push({pool:pool.map(x=>({...x})),steps:steps.map(x=>({...x}))});
 pool=pool.filter(x=>x.id!==first.id&&x.id!==second.id);pool.push({id:++uid,value:r});steps.push({a:first.value,op,b:second.value,r});selected=[];chosenOp=null;setMessage(`${first.value} ${symbol(op)} ${second.value} = ${r}`,'good');renderGame();

 if(!hosted){document.getElementById('modalCard').innerHTML=`<h3>先发布，再分享链接</h3><p>当前是本地文件，别人无法通过你的本机地址访问。请把压缩包中的 <b>index.html</b> 上传到静态网站托管服务，发布后再点击“分享”，即可把公开网址发给其他设备。</p><div class="modal-actions"><button class="main-btn" onclick="closeModal()">知道了</button></div>`;openModal();return}
 try{if(navigator.share){await navigator.share({title:'整数24点挑战',text,url});return}await navigator.clipboard.writeText(text+' '+url);toast('游戏链接已复制')}catch(e){toast('已取消分享')}
}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
window.addEventListener('keydown',e=>{if(document.getElementById('gameScreen').classList.contains('active')){if(['+','-','*','/'].includes(e.key))chooseOperator(e.key);if(e.key==='Backspace')undoStep();if(e.key==='Escape')exitMode()}})
renderModes();
</script>
